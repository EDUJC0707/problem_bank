<style>
  :root{
    color-scheme: light dark;
    --sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Menlo", monospace;

    /* light tokens */
    --bg:#F4F6F5; --surface:#FFFFFF; --surface-2:#EDF1EF; --surface-3:#E6ECE9;
    --ink:#17211E; --ink-soft:#586661; --ink-faint:#8A948F;
    --line:#E1E6E3; --line-strong:#CCD5D0;
    --accent:#0E6E63; --accent-ink:#0A544B; --accent-soft:#DBEEE8; --on-accent:#FFFFFF;
    --hl:#FBE38C; --hl-line:#E4B63C; --hl-ink:#3A2E08;
    --std:#8A5A00; --std-soft:#F6E7CC;
    --shadow-sm:0 1px 2px rgba(20,30,26,.06);
    --shadow:0 1px 2px rgba(20,30,26,.05), 0 10px 26px rgba(20,30,26,.07);
    --radius:11px; --radius-sm:8px;
  }
  /* dark tokens applied for OS-dark (unless explicitly toggled light) and for explicit dark toggle */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0E1310; --surface:#151C18; --surface-2:#1C2521; --surface-3:#232E28;
      --ink:#E9EEEB; --ink-soft:#9DA9A3; --ink-faint:#6F7A74;
      --line:#28322D; --line-strong:#38433C;
      --accent:#45C7B4; --accent-ink:#8FE7D9; --accent-soft:#14382F; --on-accent:#082019;
      --hl:rgba(232,182,60,.28); --hl-line:#C99A34; --hl-ink:#F4E6BC;
      --std:#E7B76B; --std-soft:#3A2E14;
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0E1310; --surface:#151C18; --surface-2:#1C2521; --surface-3:#232E28;
    --ink:#E9EEEB; --ink-soft:#9DA9A3; --ink-faint:#6F7A74;
    --line:#28322D; --line-strong:#38433C;
    --accent:#45C7B4; --accent-ink:#8FE7D9; --accent-soft:#14382F; --on-accent:#082019;
    --hl:rgba(232,182,60,.28); --hl-line:#C99A34; --hl-ink:#F4E6BC;
    --std:#E7B76B; --std-soft:#3A2E14;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.4);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden; }
  button{ font-family:inherit; }
  ::selection{ background:var(--hl); color:var(--hl-ink); }

  .app{ display:flex; flex-direction:column; height:100dvh; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:11px 18px; background:var(--surface); border-bottom:1px solid var(--line); flex:0 0 auto; }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; }
  .logo{ width:30px; height:30px; border-radius:8px; background:var(--accent); color:var(--on-accent);
    display:grid; place-items:center; flex:0 0 auto; box-shadow:var(--shadow-sm); }
  .logo svg{ width:17px; height:17px; display:block; }
  .brand-name{ font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .brand-tag{ font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; text-transform:uppercase;
    color:var(--accent-ink); background:var(--accent-soft); padding:3px 7px; border-radius:6px; }
  .top-right{ display:flex; align-items:center; gap:12px; }
  .stat{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); }
  .stat b{ color:var(--ink); }
  .icon-btn{ width:34px; height:34px; border-radius:8px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink-soft); cursor:pointer; display:grid; place-items:center; }
  .icon-btn:hover{ color:var(--accent-ink); border-color:var(--accent); }
  .icon-btn svg{ width:17px; height:17px; }

  /* ---------- main split ---------- */
  .main{ flex:1 1 auto; min-height:0; display:grid; grid-template-columns:1fr 1.08fr; }
  .pane{ min-height:0; display:flex; flex-direction:column; background:var(--bg); }
  .left{ border-right:1px solid var(--line); }

  /* ---------- filter bar ---------- */
  .filters{ flex:0 0 auto; padding:12px 16px 10px; display:flex; align-items:center; gap:8px;
    flex-wrap:wrap; border-bottom:1px solid var(--line); }
  .filters .flabel{ font-family:var(--mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
    color:var(--ink-faint); margin-right:2px; }
  .chip{ font-size:12.5px; padding:5px 11px; border-radius:999px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink-soft); cursor:pointer; white-space:nowrap; }
  .chip:hover{ border-color:var(--accent); color:var(--accent-ink); }
  .chip[aria-pressed="true"]{ background:var(--accent); color:var(--on-accent); border-color:var(--accent); }

  /* ---------- answer scroll ---------- */
  .answer-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:20px 20px 8px; }
  .qrow{ display:flex; align-items:flex-start; gap:9px; margin-bottom:14px; }
  .q-ic{ flex:0 0 auto; width:22px; height:22px; border-radius:6px; background:var(--surface-3);
    color:var(--ink-soft); display:grid; place-items:center; font-size:12px; margin-top:1px; }
  .q-text{ font-weight:650; font-size:15.5px; letter-spacing:-.01em; line-height:1.45; }

  .ans-tag{ display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size:10.5px; letter-spacing:.03em; color:var(--ink-faint); margin:2px 0 8px 31px; }
  .ans-tag .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); }

  .answer{ font-size:15.5px; line-height:1.78; color:var(--ink); margin:0 0 6px 31px; }
  .answer.loading{ min-height:66px; position:relative; }
  .answer b{ font-weight:670; }
  .answer .sk{ display:block; height:13px; border-radius:6px; margin:10px 0;
    background:linear-gradient(90deg,var(--surface-2),var(--surface-3),var(--surface-2));
    background-size:200% 100%; animation:sh 1.15s linear infinite; }
  .answer .sk.w1{ width:96%; } .answer .sk.w2{ width:88%; } .answer .sk.w3{ width:60%; }
  @keyframes sh{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }

  .cite{ font-family:var(--mono); font-size:11px; font-weight:600; line-height:1; vertical-align:2px;
    display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px;
    padding:0 4px; margin:0 1px; border-radius:5px; border:1px solid transparent;
    background:var(--accent-soft); color:var(--accent-ink); cursor:pointer; transition:none; }
  .cite:hover,.cite.active{ background:var(--accent); color:var(--on-accent); }

  .ev-head{ display:flex; align-items:center; gap:8px; margin:22px 0 10px 31px; }
  .ev-head .t{ font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-faint); }
  .ev-head .rule{ flex:1; height:1px; background:var(--line); }

  .ev-list{ display:flex; flex-direction:column; gap:9px; margin-left:31px; }
  .ev{ display:grid; grid-template-columns:auto 1fr auto; align-items:start; gap:11px; text-align:left;
    padding:12px 13px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--surface); cursor:pointer; box-shadow:var(--shadow-sm); position:relative; }
  .ev:hover{ border-color:var(--line-strong); }
  .ev.active{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), var(--shadow-sm); }
  .ev.active::before{ content:""; position:absolute; left:0; top:10px; bottom:10px; width:3px;
    border-radius:0 3px 3px 0; background:var(--accent); }
  .ev-num{ font-family:var(--mono); font-size:11px; font-weight:600; width:20px; height:20px;
    border-radius:5px; background:var(--accent-soft); color:var(--accent-ink);
    display:grid; place-items:center; margin-top:1px; }
  .ev-body{ min-width:0; }
  .ev-title{ font-weight:650; font-size:14px; letter-spacing:-.01em; }
  .ev-meta{ font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); margin-top:3px;
    display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .ev-meta .pg{ color:var(--accent-ink); }
  .badge{ font-family:var(--mono); font-size:10px; letter-spacing:.02em; padding:2px 6px; border-radius:5px;
    background:var(--surface-3); color:var(--ink-soft); }
  .badge.std{ background:var(--std-soft); color:var(--std); }
  .ev-snip{ font-size:13px; color:var(--ink-soft); line-height:1.6; margin-top:7px;
    padding-left:9px; border-left:2px solid var(--line-strong); }
  .ev-open{ font-family:var(--mono); font-size:11px; color:var(--ink-faint); white-space:nowrap; margin-top:2px; }
  .ev:hover .ev-open{ color:var(--accent-ink); }

  /* ---------- composer ---------- */
  .composer{ flex:0 0 auto; border-top:1px solid var(--line); background:var(--surface); padding:12px 16px 14px; }
  .presets{ display:flex; gap:7px; margin-bottom:9px; flex-wrap:wrap; }
  .preset{ font-size:12px; padding:6px 10px; border-radius:8px; border:1px dashed var(--line-strong);
    background:transparent; color:var(--ink-soft); cursor:pointer; }
  .preset:hover{ border-color:var(--accent); border-style:solid; color:var(--accent-ink); background:var(--accent-soft); }
  .inbox{ display:flex; align-items:flex-end; gap:9px; border:1px solid var(--line-strong);
    background:var(--surface); border-radius:12px; padding:8px 8px 8px 13px; }
  .inbox:focus-within{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .inbox textarea{ flex:1; border:0; outline:0; resize:none; background:transparent; color:var(--ink);
    font-family:var(--sans); font-size:14.5px; line-height:1.5; max-height:120px; padding:3px 0; }
  .inbox textarea::placeholder{ color:var(--ink-faint); }
  .send{ flex:0 0 auto; width:36px; height:36px; border-radius:9px; border:0; background:var(--accent);
    color:var(--on-accent); cursor:pointer; display:grid; place-items:center; }
  .send:hover{ filter:brightness(1.05); }
  .send svg{ width:17px; height:17px; }

  /* ---------- reader ---------- */
  .reader{ background:var(--bg); }
  .doc-head{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 18px; background:var(--surface); border-bottom:1px solid var(--line); }
  .doc-head .l{ min-width:0; }
  .doc-title{ font-weight:680; font-size:14.5px; letter-spacing:-.01em; }
  .doc-sub{ font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); margin-top:2px;
    display:flex; align-items:center; gap:7px; }
  .pagepill{ font-family:var(--mono); font-size:12px; font-weight:600; color:var(--accent-ink);
    background:var(--accent-soft); padding:5px 10px; border-radius:7px; white-space:nowrap; }

  .page-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:22px; display:flex; justify-content:center; }
  .page{ width:100%; max-width:560px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; box-shadow:var(--shadow); padding:34px 38px 40px; align-self:flex-start;
    font-size:calc(15px * var(--zoom, 1)); line-height:1.85; }
  .page .pgtop{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px;
    color:var(--ink-faint); border-bottom:1px solid var(--line); padding-bottom:12px; margin-bottom:20px; }
  .page h4{ font-size:1.08em; letter-spacing:-.01em; margin:0 0 12px; text-wrap:balance; }
  .page p{ margin:0 0 13px; color:var(--ink); }
  .page mark{ background:var(--hl); color:var(--hl-ink); padding:2px 2px; border-radius:3px;
    border-bottom:2px solid var(--hl-line); }
  .page mark.flash{ animation:pulse 1.2s ease-out 1; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 var(--hl-line); } 70%{ box-shadow:0 0 0 10px transparent; }
    100%{ box-shadow:0 0 0 0 transparent; } }
  .page .fig{ margin:18px 0 4px; padding:26px 14px; text-align:center; border:1px dashed var(--line-strong);
    border-radius:10px; color:var(--ink-faint); font-family:var(--mono); font-size:12px;
    background:var(--surface-2); }

  .reader-ctrls{ flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:9px 16px;
    background:var(--surface); border-top:1px solid var(--line); }
  .rc{ height:32px; min-width:32px; padding:0 10px; border-radius:8px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink-soft); cursor:pointer; font-size:13px; display:grid; place-items:center; }
  .rc:hover:not([disabled]){ border-color:var(--accent); color:var(--accent-ink); }
  .rc[disabled]{ opacity:.45; cursor:default; }
  .pageind{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); padding:0 4px; }
  .spacer{ flex:1; }
  .zoomval{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); width:42px; text-align:center; }

  a.srcnote{ color:var(--accent-ink); }

  @media (max-width:900px){
    body{ overflow:auto; }
    .app{ height:auto; min-height:100dvh; }
    .main{ grid-template-columns:1fr; }
    .left{ border-right:0; border-bottom:1px solid var(--line); }
    .answer-scroll{ max-height:none; }
    .page-scroll{ padding:16px; }
    .page{ padding:26px 22px 30px; }
  }
  @media (prefers-reduced-motion: reduce){
    .answer .sk{ animation:none; } .page mark.flash{ animation:none; }
  }
</style>

    <div class="brand">
      <span class="logo" aria-hidden="true">

<script>
(function(){
  "use strict";

  const SOURCES = {
    s1:{ title:"미래엔 과학 3", pub:"미래엔", type:"교과서", unit:"Ⅴ. 광합성", page:128, total:342,
      snip:"명반응은 엽록체의 틸라코이드 막에서 일어나며, 빛 에너지를 흡수해…",
      body:`<h4>2. 명반응 — 빛에너지를 화학에너지로</h4>
        <p>광합성은 크게 <b>명반응</b>과 <b>암반응</b>(캘빈 회로) 두 단계로 나뉜다. 이 중 빛이 직접 관여하는 단계가 명반응이다.</p>
        <p><mark>명반응은 엽록체의 틸라코이드 막에서 일어나며, 빛 에너지를 흡수해 물을 분해하고 ATP와 NADPH를 생성한다.</mark> 이때 물이 분해되면서 산소가 방출되는데, 우리가 호흡하는 산소의 대부분이 이 과정에서 만들어진다.</p>
        <p>명반응에서 생성된 ATP와 NADPH는 뒤이어 일어나는 암반응에서 이산화 탄소를 포도당으로 고정하는 데 쓰인다.</p>
        <div class="fig">그림 5-12. 틸라코이드 막에서 일어나는 명반응</div>` },
    s2:{ title:"비상교육 과학 3", pub:"비상교육", type:"교과서", unit:"6. 광합성", page:95, total:328,
      snip:"빛에너지로 만들어진 ATP와 NADPH는 캘빈 회로로 전달되어…",
      body:`<h4>6-2. 광합성 산물의 이동</h4>
        <p>명반응과 암반응은 서로 다른 장소에서 일어나지만 긴밀하게 연결되어 있다.</p>
        <p><mark>빛에너지로 만들어진 ATP와 NADPH는 캘빈 회로로 전달되어 포도당을 합성하는 데 사용된다.</mark> 따라서 명반응이 멈추면 암반응도 오래 진행되지 못한다.</p>
        <p>이러한 상호 의존 관계는 광합성 전체가 하나의 연속된 과정임을 보여 준다.</p>` },
    s3:{ title:"천재교과서 과학 3", pub:"천재교과서", type:"교과서", unit:"광합성과 에너지", page:140, total:356,
      snip:"물이 분해될 때 산소가 방출되며, 이는 명반응이 틸라코이드에서…",
      body:`<h4>광합성과 에너지 전환</h4>
        <p>명반응이 어디에서 일어나는지는 산소 발생 실험으로 확인할 수 있다.</p>
        <p><mark>물이 분해될 때 산소가 방출되며, 이는 명반응이 틸라코이드에서 일어난다는 증거가 된다.</mark></p>
        <p>빛의 세기가 강해질수록 일정 범위까지 산소 발생량이 늘어난다.</p>` },
    s4:{ title:"교육부 과학과 성취기준", pub:"교육부", type:"성취기준", unit:"통합과학 · 광합성", page:14, total:40,
      snip:"[9과12-01] 광합성 과정에서 빛에너지가 화학에너지로 전환되는…",
      body:`<h4>[과학] 광합성과 에너지</h4>
        <p>이 영역에서 학생들은 광합성이 에너지 전환 과정임을 이해한다.</p>
        <p><mark>[9과12-01] 광합성 과정에서 빛에너지가 화학에너지로 전환되는 과정을 설명할 수 있다.</mark></p>
        <p>· 학습 요소: 명반응, 암반응, ATP, 엽록체 &nbsp;·&nbsp; 성취수준 A~C 예시 포함</p>` },
    s5:{ title:"미래엔 과학 3", pub:"미래엔", type:"교과서", unit:"Ⅲ. 운동과 에너지", page:212, total:342,
      snip:"운동하는 물체가 가진 에너지를 운동 에너지라고 하며, Eₖ = ½mv²…",
      body:`<h4>3. 운동 에너지</h4>
        <p>움직이는 물체는 다른 물체에 일을 할 수 있는 능력을 가진다.</p>
        <p><mark>운동하는 물체가 가진 에너지를 운동 에너지라고 하며, 그 크기는 Eₖ = ½mv² 로 나타낸다.</mark> 여기서 m은 질량, v는 속력이다.</p>
        <p>따라서 운동 에너지는 질량에 비례하고 속력의 제곱에 비례한다. 속력이 2배가 되면 운동 에너지는 4배가 된다.</p>` }
  };

  const SCENARIOS = {
    q1:{ q:"광합성의 명반응은 5종 교과서에서 각각 어떻게 설명해?",
      a:`5종 교과서 모두 명반응을 <b>엽록체 틸라코이드 막</b>에서 일어나는 과정으로 설명합니다[[s1]][[s2]]. 공통적으로 빛에너지로 물을 분해해 <b>산소를 방출</b>하고 <b>ATP·NADPH를 생성</b>한다고 서술하며[[s1]][[s3]], 이 산물이 암반응(캘빈 회로)에서 포도당 합성에 쓰인다는 점을 강조합니다[[s2]]. 교육부 성취기준 <b>[9과12-01]</b>도 광합성에서 빛에너지가 화학에너지로 전환됨을 다루도록 규정합니다[[s4]].`,
      ev:["s1","s2","s3","s4"] },
    q2:{ q:"운동 에너지 공식을 설명한 부분 찾아줘",
      a:`운동 에너지는 <b>운동하는 물체가 가진 에너지</b>로, 물체의 질량과 속력으로 결정됩니다[[s5]]. 공식은 <b>Eₖ = ½mv²</b> 이며, 질량에 비례하고 <b>속력의 제곱</b>에 비례합니다[[s5]].`,
      ev:["s5"] }
  };

  const PRESETS = [
    { label:"광합성 명반응 5종 비교", key:"q1" },
    { label:"운동 에너지 공식 찾기", key:"q2" }
  ];

  const $ = (id)=>document.getElementById(id);
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let current = null;      // active scenario evidence list (for cite numbering)
  let zoom = 1;

  /* ---- theme ---- */
  const sun = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const moon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4 6.5 6.5 0 0 0 20 14.5z"/></svg>';
  function isDark(){
    const t = document.documentElement.getAttribute("data-theme");
    if(t) return t==="dark";
    return matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function paintTheme(){ $("themeBtn").innerHTML = isDark()? sun : moon; }
  $("themeBtn").addEventListener("click", ()=>{
    document.documentElement.setAttribute("data-theme", isDark()?"light":"dark");
    paintTheme();
  });
  paintTheme();

  /* ---- filters (visual toggle) ---- */
  document.querySelectorAll(".filters .chip").forEach(c=>{
    c.addEventListener("click", ()=>{
      const all = [...document.querySelectorAll(".filters .chip")];
      if(c.textContent==="전체"){ all.forEach(x=>x.setAttribute("aria-pressed", x===c?"true":"false")); return; }
      all[0].setAttribute("aria-pressed","false");
      c.setAttribute("aria-pressed", c.getAttribute("aria-pressed")==="true"?"false":"true");
      if(!all.some(x=>x.getAttribute("aria-pressed")==="true")) all[0].setAttribute("aria-pressed","true");
    });
  });

  /* ---- reader ---- */
  function setSource(id){
    const s = SOURCES[id]; if(!s) return;
    $("rTitle").textContent = s.title;
    $("rSub").innerHTML = `${s.pub} · <span class="badge ${s.type==="성취기준"?"std":""}">${s.type}</span>`;
    $("rPill").textContent = "p."+s.page;
    $("rInd").textContent = `${s.page} / ${s.total}`;
    const pg = $("rPage");
    pg.innerHTML = `<div class="pgtop"><span>${s.pub} · ${s.unit}</span><span>${s.page}</span></div>` + s.body;
    // highlight active states
    document.querySelectorAll(".ev").forEach(e=> e.classList.toggle("active", e.dataset.src===id));
    document.querySelectorAll(".cite").forEach(e=> e.classList.toggle("active", e.dataset.src===id));
    // scroll + flash the mark
    const mk = pg.querySelector("mark");
    if(mk){
      mk.classList.remove("flash"); void mk.offsetWidth; if(!reduce) mk.classList.add("flash");
      mk.scrollIntoView({ block:"center", behavior: reduce?"auto":"smooth" });
    }
    if(window.matchMedia("(max-width:900px)").matches){
      document.querySelector(".reader").scrollIntoView({ behavior: reduce?"auto":"smooth", block:"start" });
    }
  }

  /* ---- render a scenario ---- */
  function renderCites(html, ev){
    return html.replace(/\[\[(s\d)\]\]/g, (m,id)=>{
      const n = ev.indexOf(id)+1;
      return `<button class="cite" data-src="${id}">${n}</button>`;
    });
  }
  function evidenceCard(id, n){
    const s = SOURCES[id];
    return `<button class="ev" data-src="${id}">
      <span class="ev-num">${n}</span>
      <span class="ev-body">
        <span class="ev-title">${s.title}</span>
        <span class="ev-meta">${s.pub} · ${s.unit} · <span class="pg">p.${s.page}</span>
          <span class="badge ${s.type==="성취기준"?"std":""}">${s.type}</span></span>
        <span class="ev-snip">"${s.snip}"</span>
      </span>
      <span class="ev-open">열기 →</span>
    </button>`;
  }
  function run(scn, customQ){
    current = scn.ev;
    $("qText").textContent = customQ || scn.q;
    const ans = $("answer");
    ans.classList.add("loading");
    ans.innerHTML = `<span class="sk w1"></span><span class="sk w2"></span><span class="sk w3"></span>`;
    $("evList").innerHTML = "";
    const delay = reduce ? 120 : 620;
    setTimeout(()=>{
      ans.classList.remove("loading");
      ans.innerHTML = renderCites(scn.a, scn.ev);
      $("evList").innerHTML = scn.ev.map((id,i)=>evidenceCard(id,i+1)).join("");
      wire();
      setSource(scn.ev[0]);
      $("answerScroll").scrollTo({ top:0, behavior:"auto" });
    }, delay);
  }
  function wire(){
    document.querySelectorAll(".cite,.ev").forEach(el=>{
      el.addEventListener("click", ()=> setSource(el.dataset.src));
    });
  }

  /* ---- presets ---- */
  $("presets").innerHTML = PRESETS.map((p,i)=>`<button class="preset" data-key="${p.key}">${p.label}</button>`).join("");
  $("presets").querySelectorAll(".preset").forEach(b=>{
    b.addEventListener("click", ()=> run(SCENARIOS[b.dataset.key]));
  });

  /* ---- composer ---- */
  const ta = $("qInput");
  ta.addEventListener("input", ()=>{ ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,120)+"px"; });
  function submit(){
    const v = ta.value.trim();
    if(!v){ run(SCENARIOS.q1); return; }
    // demo: any typed question maps to the richer scenario, shown with the user's wording
    run(SCENARIOS.q1, v);
    ta.value=""; ta.style.height="auto";
  }
  $("sendBtn").addEventListener("click", submit);
  ta.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submit(); } });

  /* ---- zoom ---- */
  function setZoom(z){ zoom=Math.max(.85,Math.min(1.35,z)); $("rPage").style.setProperty("--zoom",zoom);
    $("zVal").textContent=Math.round(zoom*100)+"%"; }
  $("zIn").addEventListener("click", ()=>setZoom(zoom+.1));
  $("zOut").addEventListener("click", ()=>setZoom(zoom-.1));

  /* ---- initial state ---- */
  current = SCENARIOS.q1.ev;
  $("qText").textContent = SCENARIOS.q1.q;
  $("answer").innerHTML = renderCites(SCENARIOS.q1.a, SCENARIOS.q1.ev);
  $("evList").innerHTML = SCENARIOS.q1.ev.map((id,i)=>evidenceCard(id,i+1)).join("");
  wire();
  setSource("s1");
})();
</script>
